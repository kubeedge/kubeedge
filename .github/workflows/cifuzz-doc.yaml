name: CIFuzz
on: 
  push:
    branches:
      - master
    tags:
    paths:
      - '**.md'
      - 'docs/**'
      - '**/OWNERS'
      - '**/MAINTAINERS'
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
      - '**/OWNERS'
      - '**/MAINTAINERS'

permissions:
  contents: read

jobs:
  Fuzzing:
    runs-on: ubuntu-22.04
    steps:
      - run: 'echo "only docs modified, no need to trigger CI"'
